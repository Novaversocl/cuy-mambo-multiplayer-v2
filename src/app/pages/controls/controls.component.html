<div class="arcade-wrapper">
  <div class="crt-lines"></div>

  <div class="arcade-content">

    <header class="page-header">
      <h1 class="page-title">MANUAL</h1>
      <p class="page-sub">HOW TO PLAY</p>
    </header>

    <section class="controls-section">
      <h2 class="section-title">MOVIMIENTO</h2>
      <div class="controls-grid">
        <div class="control-item">
          <span class="key">◀ ▶</span>
          <span class="desc">MOVER</span>
        </div>
        <div class="control-item">
          <span class="key">SPACE</span>
          <span class="desc">SALTAR</span>
        </div>
      </div>
    </section>

    <section class="controls-section">
      <h2 class="section-title">DISPARO</h2>
      <div class="controls-grid">
        <div class="control-item">
          <span class="key">ENTER</span>
          <span class="desc">DISPARO NORMAL</span>
        </div>
        <div class="control-item">
          <span class="key">3 SEG</span>
          <span class="desc">CARGA CIAN</span>
        </div>
        <div class="control-item">
          <span class="key">8 SEG</span>
          <span class="desc">⚡ SÚPER DISPARO</span>
        </div>
      </div>
    </section>

    <section class="controls-section">
      <h2 class="section-title">POWER-UPS</h2>
      <div class="powerups-grid">
        <div class="powerup-item">
          <span class="icon">⚡</span>
          <span class="name">VELOCIDAD</span>
        </div>
        <div class="powerup-item">
          <span class="icon">🚪</span>
          <span class="name">PUERTA MISTERIOSA</span>
        </div>
      </div>
    </section>

    <section class="controls-section">
      <h2 class="section-title">ARMAS</h2>
      <div class="powerups-grid">
        <div class="powerup-item">
          <span class="icon">🍖</span>
          <span class="name">LANZACOMIDA</span>
        </div>
        <div class="powerup-item">
          <span class="icon">💥</span>
          <span class="name">ESCOPETA</span>
        </div>
        <div class="powerup-item">
          <span class="icon">💣</span>
          <span class="name">MINA</span>
        </div>
        <div class="powerup-item">
          <span class="icon">🔥</span>
          <span class="name">LANZALLAMAS</span>
        </div>
        <div class="powerup-item">
          <span class="icon">👾</span>
          <span class="name">INVOCACIÓN</span>
        </div>
      </div>
    </section>

    <div class="back-link">
      <a routerLink="/home" class="btn-back">◀ VOLVER</a>
    </div>

  </div>
</div>
