<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Body -->
  <rect x="4" y="7" width="8" height="6" fill="#c0c0c0"/>
  <!-- Head -->
  <rect x="5" y="5" width="6" height="4" fill="#c0c0c0"/>
  <!-- Ears -->
  <rect x="4" y="3" width="3" height="3" fill="#c0c0c0"/>
  <rect x="9" y="3" width="3" height="3" fill="#c0c0c0"/>
  <rect x="5" y="4" width="1" height="1" fill="#ff69b4"/>
  <rect x="10" y="4" width="1" height="1" fill="#ff69b4"/>
  <!-- Eyes -->
  <rect x="6" y="6" width="1" height="1" fill="#ff0000"/>
  <rect x="9" y="6" width="1" height="1" fill="#ff0000"/>
  <!-- Nose -->
  <rect x="7" y="8" width="2" height="1" fill="#ff69b4"/>
  <!-- Tail -->
  <rect x="12" y="10" width="2" height="1" fill="#a0a0a0"/>
  <rect x="14" y="11" width="1" height="2" fill="#a0a0a0"/>
  <!-- Feet -->
  <rect x="5" y="13" width="2" height="1" fill="#a0a0a0"/>
  <rect x="9" y="13" width="2" height="1" fill="#a0a0a0"/>
</svg>
